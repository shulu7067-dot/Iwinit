<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Hub — Find Offers, Submit Leads</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="logo" href="index.html"><span class="mark"></span>Referral Hub</a>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-links">
      <li><a href="index.html" aria-current="page">Home / Leads</a></li>
      <li><a href="track.html">Track Lead</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
</header>

<div class="banner">
  <a href="https://raw.githubusercontent.com/shulu7067-dot/Iwinit/refs/heads/main/9A64FAD3-79E8-485E-9B2F-B80045F5E414.png" class="banner-link">
    <img src="images/banner.jpg" alt="Refer someone and get paid" class="banner-image">
  </a>
</div>

<section class="page-intro">
  <span class="eyebrow">Open Offers</span>
</section>

<div class="controls">
  <input type="search" id="searchInput" placeholder="Search offers or companies…" aria-label="Search offers">
  <select id="categoryFilter" aria-label="Filter by category">
    <option value="">All categories</option>
  </select>
  <select id="rewardFilter" aria-label="Sort by reward">
    <option value="">Sort: default</option>
    <option value="high">Reward: high to low</option>
    <option value="low">Reward: low to high</option>
  </select>
</div>

<p class="results-count" id="resultsCount"></p>

<section class="offer-grid" id="offerGrid" aria-live="polite"></section>
<p class="no-results" id="noResults">No offers match your search. Try a different keyword or category.</p>

<footer class="site-footer">
  © 2026 Referral Hub. Earn commissions for approved referrals.
</footer>

<script src="script.js"></script>
</body>
</html>
