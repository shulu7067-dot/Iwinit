<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit a Lead - Referral Hub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="logo" href="index.html"><span class="mark"></span>Referral Hub</a>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">Home / Leads</a></li>
      <li><a href="track.html">Track Lead</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
</header>

<main class="form-container">

<h1>Submit a Referral</h1>
<p>Complete the form below to submit your referral.</p>

<form id="leadForm"
      action="https://formspree.io/f/xbdvpjkb"
      method="POST">

<h2>Your Details</h2>

<label>First Name</label>
<input type="text" name="yourName" required>

<label>Surname</label>
<input type="text" name="yourSurname" required>

<label>Phone Number</label>
<input type="tel" name="yourPhone" required>

<label>Email (Optional)</label>
<input type="email" name="yourEmail">

<h2>Person You're Referring</h2>

<label>First Name</label>
<input type="text" name="refName" required>

<label>Surname</label>
<input type="text" name="refSurname" required>

<label>Phone Number</label>
<input type="tel" name="refPhone" required>

<label>Notes (Optional)</label>
<textarea name="notes" rows="4"></textarea>

<button type="submit" class="btn btn-primary">
Submit Referral
</button>

</form>

</main>

</main>

<footer class="site-footer">
© 2026 Referral Hub. Earn commissions for approved referrals.
</footer>

<script>
document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();

    const trackingCode = "RF" + Math.floor(10000 + Math.random()*90000);

    alert(
`Referral submitted successfully!

Tracking Code:
${trackingCode}

Please save this code to track your referral.`
    );

    window.location.href = "track.html";
});
</script>

</body>
</html>
