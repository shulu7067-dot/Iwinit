<script>
// Mobile menu
const toggle = document.querySelector('.nav-toggle');
const links = document.querySelector('.nav-links');

if (toggle && links) {
  toggle.addEventListener('click', () => {
    links.classList.toggle('open');
  });
}

// Get selected offer from URL
const params = new URLSearchParams(window.location.search);
const offerId = params.get("offer");

// Same IDs as your OFFERS array
const offerNames = {
  "insurance-tracker-referral": "Insurance & Tracker Referrals"
};

document.getElementById("selectedOffer").value =
  offerNames[offerId] || "General Referral";

// Submit form
document.getElementById("leadForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const form = e.target;
    const trackingCode = "RF" + Math.floor(10000 + Math.random() * 90000);

    // Hidden tracking code
    const hidden = document.createElement("input");
    hidden.type = "hidden";
    hidden.name = "trackingCode";
    hidden.value = trackingCode;
    form.appendChild(hidden);

    try {
        const response = await fetch(form.action, {
            method: "POST",
            body: new FormData(form),
            headers: {
                "Accept": "application/json"
            }
        });

        if (response.ok) {
            alert(`Referral submitted successfully!

Tracking Code:
${trackingCode}

Please save this code to track your referral.`);

            window.location.href =
                `track.html?code=${trackingCode}`;
        } else {
            alert("Something went wrong. Please try again.");
        }

    } catch (err) {
        alert("Unable to submit. Please check your internet connection.");
    }
});
</script>
