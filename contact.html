<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Referral Hub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="logo" href="index.html"><span class="mark"></span>Referral Hub</a>
    <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">Home / Leads</a></li>
      <li><a href="track.html">Track Lead</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html" aria-current="page">Contact Us</a></li>
    </ul>
  </div>
</header>

<section class="panel-narrow">
  <div class="card">
    <span class="eyebrow">Get In Touch</span>
    <h1 style="font-size:1.4rem;">Send us a message</h1>
    <form class="contact-form" id="contactForm">
      <label>Name
        <input type="text" id="cName" required>
      </label>
      <label>Email
        <input type="email" id="cEmail" required>
      </label>
      <label>WhatsApp
        <input type="tel" id="cWhatsapp">
      </label>
      <label>Message
        <textarea id="cMessage" rows="4" required></textarea>
      </label>
      <button class="btn btn-primary" type="submit">Send via WhatsApp</button>
    </form>

    <div class="contact-alt">
      <div><strong>WhatsApp</strong><br>+27 65 779 3861</div>
      <div><strong>Email</strong><br>Info@iwinit.co.za</div>      
      <div><strong>Email</strong><br>support@iwinit.co.za</div>
      <div><strong>Office Hours</strong><br>Mon–Fri, 08:00–17:00</div>
    </div>
  </div>
</section>

<footer class="site-footer">
  © 2026 IWINIT. Earn commissions for approved referrals.
</footer>

<script src="script.js"></script>
</body>
</html>
