<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Details</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
    <div class="nav-wrap">
        <a class="logo" href="index.html">
            <span class="mark"></span>Referral Hub
        </a>
    </div>
</header>

<main class="offer-page">

    <span class="offer-category" id="category"></span>

    <h1 id="title"></h1>

    <div class="reward-card">
        <h2>Reward</h2>
        <p id="reward"></p>
    </div>

    <section>
        <h2>Description</h2>
        <p id="description"></p>
        <a href="submit.html" id="submitLink" class="offer-submit">
            Submit a Lead
        </a>
    </section>

    <section>
        <h2>How it Works</h2>
        <ol id="steps"></ol>
    </section>

    <section>
        <h2>Requirements</h2>
        <ul id="requirements"></ul>
    </section>

</main>

<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const offer = OFFERS.find(o => o.id === id);

if (offer) {

    document.getElementById("category").textContent = offer.category;
    document.getElementById("title").textContent = offer.title;
    document.getElementById("reward").textContent = offer.reward;
    document.getElementById("description").textContent = offer.desc;

    document.getElementById("steps").innerHTML =
        offer.steps.map(step => `<li>${step}</li>`).join("");

    document.getElementById("requirements").innerHTML =
        offer.requirements.map(req => `<li>${req}</li>`).join("");

    document.getElementById("submitLink").href = `submit.html?offer=${offer.id}`;

} else {

    document.querySelector(".offer-page").innerHTML =
        "<h2>Offer not found.</h2>";

}
</script>

</body>
</html>
