<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Details — IWINIT</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
    <div class="nav-wrap">
        <a class="logo" href="index.html">
            <span class="mark"></span>IWINIT
        </a>
    </div>
</header>

<main class="offer-page">

    <span class="offer-category" id="category"></span>

    <h1 id="title"></h1>

    <div class="reward-card">
        <h2>Opportunity Details</h2>
        <p id="reward"></p>
    </div>

    <section>
        <h2>Description</h2>
        <p id="description"></p>
    </section>

    <section>
        <h2>Application Process</h2>
        <ol id="steps"></ol>
    </section>

    <section>
        <h2>Requirements</h2>
        <ul id="requirements"></ul>
    </section>

    <a href="#" id="applyLink" class="offer-submit" target="_blank" rel="noopener">
        Read More
    </a>

</main>

<footer class="site-footer">
    © 2026 IWINIT. Discover opportunities from trusted organisations.
</footer>

<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const offer = OFFERS.find(o => o.id === id);

if (offer) {

    document.getElementById("category").textContent = offer.category;
    document.getElementById("title").textContent = offer.title;
    document.getElementById("reward").textContent = offer.reward;
    document.getElementById("description").textContent = offer.desc;

    document.getElementById("steps").innerHTML =
        offer.steps.map(step => `<li>${step}</li>`).join("");

    document.getElementById("requirements").innerHTML =
        offer.requirements.map(req => `<li>${req}</li>`).join("");

    const applyButton = document.getElementById("applyLink");

    applyButton.href = offer.link;

    switch (offer.category) {

        case "Jobs":
            applyButton.textContent = "Apply Now";
            break;

        case "Bursaries":
            applyButton.textContent = "Apply for Bursary";
            break;

        case "Competitions":
            applyButton.textContent = "Enter Competition";
            break;

        case "Discounts":
            applyButton.textContent = "Get Discount";
            break;

        case "Referral Programs":
            applyButton.textContent = "Read More";
            break;

        case "Business":
            applyButton.textContent = "Learn More";
            break;

        default:
            applyButton.textContent = "Read More";
    }

} else {

    document.querySelector(".offer-page").innerHTML =
        "<h2>Opportunity not found.</h2><p>Please return to the homepage and choose another opportunity.</p>";

}
</script>

</body>
</html>
