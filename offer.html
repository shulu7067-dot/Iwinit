<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const offer = OFFERS.find(o => o.id === id);

if (offer) {

    document.getElementById("category").textContent = offer.category;
    document.getElementById("title").textContent = offer.title;
    document.getElementById("reward").textContent = offer.reward;
    document.getElementById("description").textContent = offer.desc;

    document.getElementById("steps").innerHTML =
        offer.steps.map(step => `<li>${step}</li>`).join("");

    document.getElementById("requirements").innerHTML =
        offer.requirements.map(req => `<li>${req}</li>`).join("");

    const applyButton = document.getElementById("applyLink");

    applyButton.href = offer.applyUrl;

  applyButton.textContent = offer.buttonText || "Read More";
} else {

    document.querySelector(".offer-page").innerHTML =
        "<h2>Opportunity not found.</h2><p>Please return to the homepage and choose another opportunity.</p>";

}
</script>
